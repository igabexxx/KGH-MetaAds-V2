version: '3.8'

# =============================================================
# KGH META ADS — DOCKER COMPOSE STACK
# =============================================================
# Usage:
#   Standard:     docker compose up -d
#   With Ollama:  docker compose --profile local-llm up -d
# =============================================================

services:

  # ─────────────────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kgh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-kgh_metads}
      POSTGRES_USER: kgh
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - pgdata_v2:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kgh -d kgh_metads"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kgh_network

  # ─────────────────────────────────────────────────────────
  # FastAPI Backend + Serve Frontend
  # ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kgh_backend_v2
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://kgh:${DB_PASSWORD}@postgres:5432/${DB_NAME:-kgh_metads}
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN}
      META_AD_ACCOUNT_ID: ${META_AD_ACCOUNT_ID}
      META_PAGE_ID: ${META_PAGE_ID}
      META_API_VERSION: ${META_API_VERSION:-v19.0}
      API_SECRET_KEY: ${API_SECRET_KEY}
      WEBHOOK_VERIFY_TOKEN: ${WEBHOOK_VERIFY_TOKEN}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
      N8N_BASE_URL: http://n8n:5678
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      LLM_API_KEY: ${LLM_API_KEY}
      SOCIALCHAT_API_KEY: ${SOCIALCHAT_API_KEY}
      SOCIALCHAT_APP_ID: ${SOCIALCHAT_APP_ID}
      SOCIALCHAT_SECRET_KEY: ${SOCIALCHAT_SECRET_KEY}
      SOCIALCHAT_BASE_URL: ${SOCIALCHAT_BASE_URL}
    ports:
      - "8005:8000"
    depends_on:
      - postgres
    networks:
      - kgh_network

  # ─────────────────────────────────────────────────────────
  # N8N Workflow Orchestrator
  # ─────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: kgh_n8n_v2
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${DB_NAME:-kgh_metads}
      DB_POSTGRESDB_USER: kgh
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: Asia/Jakarta
      TZ: Asia/Jakarta
      N8N_LOG_LEVEL: info
      N8N_SECURE_COOKIE: "false"
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 168
    ports:
      - "5680:5678"
    depends_on:
      - postgres
    volumes:
      - n8n_data_v2:/home/node/.n8n
      - ./n8n/workflows:/home/node/workflows:ro
    networks:
      - kgh_network

  # ─────────────────────────────────────────────────────────
  # OpenClaw AI Agent
  # ─────────────────────────────────────────────────────────
  openclaw:
    image: python:3.11-slim
    container_name: kgh_openclaw
    command: >
      bash -c "echo 'OpenClaw container placeholder running' && sleep infinity"
    restart: unless-stopped
    volumes:
      - ./openclaw:/app/openclaw
    working_dir: /app/openclaw
    environment:
      OPENCLAW_MODEL_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENCLAW_MODEL_NAME: ${LLM_MODEL:-gpt-4o}
      OPENCLAW_API_KEY: ${LLM_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_NUMBER_ID: ${WHATSAPP_NUMBER_ID}
      OPENCLAW_BACKEND_URL: http://backend:8000
      OPENCLAW_N8N_URL: http://n8n:5678
    ports:
      - "3100:3100"
    depends_on:
      - backend
    networks:
      - kgh_network

  # ─────────────────────────────────────────────────────────
  # Ollama — Local LLM (Optional, profile: local-llm)
  # ─────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: kgh_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - local-llm
    networks:
      - kgh_network

  # ─────────────────────────────────────────────────────────
  # Cloudflare Tunnel (Persistent)
  # ─────────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: kgh_cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - kgh_network
    depends_on:
      - backend

# ─────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────
volumes:
  pgdata_v2:
    driver: local
  n8n_data_v2:
    driver: local
  ollama_data:
    driver: local

# ─────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────
networks:
  kgh_network:
    driver: bridge
    name: kgh_metads_network
